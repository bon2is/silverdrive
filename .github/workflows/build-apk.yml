name: Build Android APK

on:
  push:
    branches:
      - main
      - claude/android-admob-distribution-ny6si
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java ──────────────────────────────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ── Android SDK (ubuntu-latest 사전 설치 SDK 활용) ─────────
      - name: Setup Android SDK platform 35
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls $ANDROID_HOME/cmdline-tools/ || true
          # License 동의
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          # Platform 35 + build-tools 설치
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0"
          # Gradle이 SDK를 찾을 수 있도록 local.properties 생성
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      # ── Node.js / Next.js 빌드 ─────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npm run build:app
        env:
          NODE_ENV: production
          NEXT_PUBLIC_ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          NEXT_PUBLIC_ADMOB_BANNER_ID: ${{ secrets.ADMOB_BANNER_ID }}
          NEXT_PUBLIC_ADMOB_REWARD_ID: ${{ secrets.ADMOB_REWARD_ID }}

      # ── Web assets + Capacitor 설정 파일 생성 ─────────────────
      - name: Copy web assets and Capacitor configs
        run: |
          mkdir -p android/app/src/main/assets
          rm -rf android/app/src/main/assets/public
          cp -r out android/app/src/main/assets/public
          echo '{
            "appId": "com.andxo.silverdrive",
            "appName": "실버드라이브",
            "webDir": "out",
            "android": { "backgroundColor": "#1a1a2e" }
          }' > android/app/src/main/assets/capacitor.config.json
          echo '[{"pkg":"@capacitor-community/admob","classpath":"com.getcapacitor.community.admob.AdMob"}]' \
            > android/app/src/main/assets/capacitor.plugins.json

      # ── Gradle 빌드 ───────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Patch node_modules Gradle files (add maven.google.com)
        run: |
          python3 - <<'PYEOF'
          import os
          files = [
            'node_modules/@capacitor/android/capacitor/build.gradle',
            'node_modules/@capacitor-community/admob/android/build.gradle',
          ]
          for path in files:
            if not os.path.exists(path):
              print(f'SKIP (not found): {path}')
              continue
            with open(path) as f:
              content = f.read()
            patched = content.replace(
              "google()\n",
              "maven { url = 'https://maven.google.com/' }\n        google()\n",
              1  # only first occurrence (buildscript block)
            )
            with open(path, 'w') as f:
              f.write(patched)
            print(f'Patched: {path}')
          PYEOF

      - name: Check Maven URLs via annotations
        run: |
          DL=$(curl -o /dev/null -s -w "%{http_code}" "https://dl.google.com/dl/android/maven2/com/android/tools/build/gradle/8.13.0/gradle-8.13.0.pom")
          MG=$(curl -o /dev/null -s -w "%{http_code}" "https://maven.google.com/com/android/tools/build/gradle/8.13.0/gradle-8.13.0.pom")
          KT=$(curl -o /dev/null -s -w "%{http_code}" "https://plugins.gradle.org/m2/org/jetbrains/kotlin/kotlin-gradle-plugin/2.2.20/kotlin-gradle-plugin-2.2.20.pom")
          echo "dl.google.com AGP=$DL  maven.google.com AGP=$MG  Kotlin=$KT"
          if [ "$DL" != "200" ] && [ "$MG" != "200" ]; then
            echo "::error::Both Google Maven URLs inaccessible (dl=$DL mg=$MG) — AGP cannot be resolved"
          elif [ "$DL" != "200" ]; then
            echo "::warning::dl.google.com returned $DL for AGP; maven.google.com returned $MG"
          else
            echo "::notice::Google Maven accessible (dl=$DL)"
          fi

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle-output.txt; exit ${PIPESTATUS[0]}
        working-directory: android

      - name: Print Gradle log on failure
        if: failure()
        run: |
          LINES=$(wc -l < /tmp/gradle-output.txt 2>/dev/null || echo 0)
          echo "::error::Gradle build failed (log: $LINES lines)"
          tail -60 /tmp/gradle-output.txt 2>/dev/null || echo "(no log found)"

      # ── APK 업로드 ────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: silverdrive-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Gradle log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-log-${{ github.run_number }}
          path: /tmp/gradle-output.txt
          retention-days: 7

      - name: APK build summary
        if: success()
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          SIZE=$(du -h $APK | cut -f1)
          echo "## APK 빌드 완료" >> $GITHUB_STEP_SUMMARY
          echo "- 파일: app-debug.apk ($SIZE)" >> $GITHUB_STEP_SUMMARY
          echo "- Actions > Artifacts 탭에서 다운로드하세요" >> $GITHUB_STEP_SUMMARY
